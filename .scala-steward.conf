# Scala Steward configuration.
# See https://scala-steward.org/docs/configuration.html

# Run scalafmt after each dependency upgrade so that PRs are always
# formatted and pass the build-check workflow without an auto-fix commit.
scalafmt.runAfterUpgrade = true

# Format PR titles to match the project's [type][scope] convention.
commits.message.title = "[update][deps] Updated ${artifactName} from ${currentVersion} to ${nextVersion}."
