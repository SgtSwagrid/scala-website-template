# Opens pull requests for outdated dependencies once a week.
#
# Requirements:
#   - A GitHub Personal Access Token (PAT) must be stored as the `PAT` repository secret.

name: Scala Steward

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:

  scala-steward:
    name: Update Dependencies
    runs-on: ubuntu-latest

    steps:

      - name: Scala Steward
        uses: scala-steward-org/scala-steward-action@v2
        with:
          github-token: ${{ secrets.PAT }}
