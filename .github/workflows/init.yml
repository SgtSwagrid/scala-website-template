# One-time repository initialisation: applies settings and creates branch protection
# rulesets that cannot be defined in static config files. Safe to re-run.

name: Initialise Repository

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  init:
    name: Initialise Repository
    runs-on: ubuntu-latest
    permissions:
      administration: write
      contents: read

    steps:

      - name: Checkout code
        id: checkout
        uses: actions/checkout@v4

      # Sets the default squash-merge commit title to the PR title rather than
      # the last commit message, so merged commits are consistently named.
      - name: Set PR title as default merge commit title
        id: squash-to-pr-title
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}" --method PATCH \
            --field squash_merge_commit_title=PR_TITLE

      # Reads the ruleset definition from the JSON file, strips non-API fields,
      # then POSTs to the repository rulesets API. Skips the step if a ruleset
      # with the same name already exists.
      - name: Add ruleset "Require Build Check"
        id: require-build-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RULESET_NAME=$(jq -r '.name' .github/rulesets/require-build-check.json)

          EXISTING_ID=$(gh api "repos/${{ github.repository }}/rulesets" \
            --jq ".[] | select(.name == \"$RULESET_NAME\") | .id" 2>/dev/null || true)

          if [ -n "$EXISTING_ID" ]; then
            exit 0
          fi

          jq 'del(._comment)' .github/rulesets/require-build-check.json \
            | gh api "repos/${{ github.repository }}/rulesets" --method POST --input -

          echo "Ruleset '$RULESET_NAME' created successfully."
