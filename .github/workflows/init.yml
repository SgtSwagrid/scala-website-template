# One-time repository initialisation: applies settings and creates branch protection
# rulesets that cannot be defined in static config files. Safe to re-run.
#
# Requirements:
#   - A GitHub Personal Access Token (PAT) with admin scope must be stored as the
#     `GH_TOKEN` repository secret. Admin access is required to manage rulesets and
#     repository settings, which exceed GITHUB_TOKEN's maximum permissions.

name: Initialisation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  init:
    runs-on: ubuntu-latest

    steps:

      - name: Check requirements
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_TOKEN secret is not set." \
              "Create a GitHub Personal Access Token with sufficient access" \
              "and add it as a repository secret named GH_TOKEN."
            exit 1
          fi

      - name: Configure settings
        id: configure
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}" --method PATCH \
            --field squash_merge_commit_title=PR_TITLE \
            --field delete_branch_on_merge=true \
            --field allow_update_branch=true

          gh api "repos/${{ github.repository }}/actions/permissions/workflow" --method PUT \
            --field default_workflow_permissions=write \
            --field can_approve_pull_request_reviews=true
